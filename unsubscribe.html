<!DOCTYPE html>
<html>
<head>
<title>Unsubscribe</title>
    <script type="text/javascript">
        var clevertap = {event:[], profile:[], region: 'sg1', account:[], onUserLogin:[], notifications:[], privacy:[]};
        clevertap.account.push({"id": "R57-875-KK7Z"});
        clevertap.privacy.push({optOut: false});
        clevertap.privacy.push({useIP: false});
        (function() {
            var wzrk = document.createElement('script');
            wzrk.type = 'text/javascript';
            wzrk.async = true;
            wzrk.src = ('https:' == document.location.protocol ? 'https://d2r1yp2w7bby2u.cloudfront.net' : 'http://static.clevertap.com') + '/js/clevertap.min.js';
            var s = document.getElementsByTagName('script')[0];
            s.parentNode.insertBefore(wzrk, s);
        })();
    </script>
<style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 40px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 8px; }
    .underline { display: inline-block; border-bottom: 3px solid #00c853; padding-bottom: 2px; }
    p { color: #555; font-size: 14px; line-height: 1.6; margin: 16px 0; }
    .email { font-weight: bold; color: #222; }
    .group-name { font-weight: bold; color: #222; }
    .buttons { display: flex; gap: 16px; justify-content: center; margin-top: 24px; }
    .btn-yes { background: #e91e8c; color: white; border: none; padding: 14px 40px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .btn-no  { background: white; color: #333; border: 2px solid #ccc; padding: 14px 40px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .btn-yes:hover { background: #c2185b; }
    .btn-no:hover  { background: #f5f5f5; }
    .note-ok { color: #00c853; font-weight: bold; }
    #success { display: none; font-weight: bold; margin-top: 20px; color: #00c853; }
    #loading { color: #999; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
    <h2><span class="underline">Unsubscribe</span></h2>

    <div id="loading"><p>Loading your preferences...</p></div>

    <!-- Shown when the campaign's group is still subscribed -->
    <div id="content" style="display:none">
        <p>
            Use the Unsubscribe button to stop receiving
            <span class="group-name" id="group-display"></span>
            emails from us at <span class="email" id="email-display"></span>.
        </p>
        <p>You will miss out on our deals and exclusive offers. Are you sure you want to unsubscribe?</p>
        <div class="buttons">
            <button class="btn-yes" onclick="changeSubscriptionGroups()">YES</button>
            <button class="btn-no"  onclick="goBack()">NO</button>
        </div>
    </div>

    <!-- Shown when the campaign's group is ALREADY unsubscribed (repeat visit) -->
    <div id="already" style="display:none">
        <p>
            You've already unsubscribed from
            <span class="group-name" id="already-group"></span>
            emails at <span class="email" id="already-email"></span>.
        </p>
        <p class="note-ok">No further action is needed.</p>
    </div>

    <!-- Shown after a successful action this visit -->
    <div id="success"></div>
</div>

<script>
/*
 * Group-unsubscribe landing page.
 *
 * Key facts this relies on (confirmed against CleverTap's EmailSubscriptionServlet behaviour):
 *  - getEmail(reEncoded, withGroups): pass withGroups = true so profile.groups is populated.
 *  - On a page_type=group link, profile.groups is server-filtered to ONLY this campaign's group(s).
 *    => No need to guess the source group or hard-code its name.
 *  - Each group's isUnsubscribed is re-fetched live on every load, so it is the authoritative
 *    "already unsubscribed?" signal for repeat visits. No cookies / localStorage needed.
 */

var campaignGroups = [];   // the campaign's group(s), as returned by the SDK

window.onload = waitForCT;

function waitForCT() {
    if (typeof $WZRK_WR !== 'undefined' && typeof $WZRK_WR.getEmail === 'function') {
        $WZRK_WR.getEmail(false, true);   // withGroups = true
    } else {
        setTimeout(waitForCT, 100);
    }
}

function wzrk_email_fetched(emailStr, profile) {
    hide('loading');

    if (!profile || !Array.isArray(profile.groups) || profile.groups.length === 0) {
        showInline('No subscription groups are associated with this email.');
        return;
    }

    // profile.groups is already scoped to this campaign on a group-unsubscribe link.
    campaignGroups = profile.groups;

    // Keep the SDK's internal group list in sync so changeSubscriptionGroups() acts on the
    // same scoped set (and never touches the user's other account groups).
    $WZRK_WR.setSubscriptionGroups(campaignGroups);
    if (typeof $WZRK_WR.setUpdatedCategoryLong === 'function') {
        $WZRK_WR.setUpdatedCategoryLong(profile);
    }

    var groupNames = campaignGroups.map(function (g) { return g.name; }).join(', ');

    // Authoritative repeat-visit check: are ALL of this campaign's groups already off?
    var alreadyUnsubscribed = campaignGroups.every(function (g) { return g.isUnsubscribed === true; });

    if (alreadyUnsubscribed) {
        document.getElementById('already-group').textContent = groupNames;
        document.getElementById('already-email').textContent = emailStr;
        show('already');
    } else {
        document.getElementById('group-display').textContent = groupNames;
        document.getElementById('email-display').textContent = emailStr;
        show('content');
    }
}

function changeSubscriptionGroups() {
    // Unsubscribe from exactly the campaign's scoped group(s).
    var groups = $WZRK_WR.getSubscriptionGroups();
    var updated = groups.map(function (g) { return { name: g.name, isUnsubscribed: true }; });
    $WZRK_WR.changeSubscriptionGroups(false, updated);
}

function wzrk_email_subscription(status) {
    // status 0 : unsubscribed, status 1 : (re)subscribed
    hide('content');
    var el = document.getElementById('success');
    el.style.display = 'block';
    var groupNames = campaignGroups.map(function (g) { return g.name; }).join(', ');
    if (status == 0) {
        el.style.color = '#00c853';
        el.textContent = "You've been unsubscribed from " + groupNames + " emails.";
    } else {
        el.style.color = '#555';
        el.textContent = "Your subscription preference has been updated.";
    }
}

function wzrk_email_fetched_failed() {
    hide('loading');
    showInline('Unable to load your subscription preferences. Please use the unsubscribe link directly from your email.');
}

function goBack() { history.back(); }

/* --- small helpers --- */
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showInline(msg) {
    var c = document.getElementById('content');
    c.innerHTML = '<p style="color:#888">' + msg + '</p>';
    c.style.display = 'block';
}
</script>
</body>
</html>
